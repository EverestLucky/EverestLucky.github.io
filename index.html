<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>this is a test website</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>你好，世界！hello world</h1>
        <p>这是一个简单的 HTML 页面示例。</p>
        <button id="btn">点我试试</button>
        <p id="message" style="margin-top: 20px; color: green;"></p>
    </div>

    <script>
        const button = document.getElementById('btn');
        const message = document.getElementById('message');

        button.addEventListener('click', () => {
            message.textContent = "按钮被点击了！你真棒！🎉";
        });
    </script>

</body>
</html>
